<!DOCTYPE html>
<html>

<head>

<title>Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Analytics Dashboard </h2>

<a href="/courses" class="btn btn-primary">Back</a>

<hr>

<canvas id="ratingChart"></canvas>

<br>

<canvas id="levelChart"></canvas>

</div>

<script>

const ratingData = {{ rating_counts | tojson }};
const levelData = {{ level_counts | tojson }};

new Chart(document.getElementById("ratingChart"), {

type: "bar",

data: {
labels: Object.keys(ratingData),
datasets: [{
label: "Ratings Distribution",
data: Object.values(ratingData)
}]
}

});

new Chart(document.getElementById("levelChart"), {

type: "pie",

data: {
labels: Object.keys(levelData),
datasets: [{
data: Object.values(levelData)
}]
}

});

</script>

</body>

</html>
